<!DOCTYPE html>
<html>
<head>
<title>Request a Project - NextByte Studio</title>
</head>

<body>

<h1>Request a Project</h1>

<p>Fill the form below to request an app or website from NextByte Studio.</p>

<form>

<label>Name:</label><br>
<input type="text" name="name"><br><br>

<label>Email:</label><br>
<input type="email" name="email"><br><br>

<label>Project Type:</label><br>
<select name="project">
<option>Mobile App</option>
<option>Website</option>
<option>Desktop Software</option>
<option>Custom Tool</option>
</select><br><br>

<label>Budget:</label><br>
<select name="budget">
<option>₹5k - ₹10k</option>
<option>₹10k - ₹50k</option>
<option>₹50k+</option>
</select><br><br>

<label>Project Description:</label><br>
<textarea rows="5" cols="40"></textarea><br><br>

<button type="submit">Submit Request</button>

</form>

<br><br>

<a href="index.html">Back to Home</a>

</body>
</html>
