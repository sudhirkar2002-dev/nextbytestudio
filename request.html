<!DOCTYPE html>
<html>
<head>
<title>Request Project - NextByte Studio</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
background:linear-gradient(120deg,#020617,#0f172a,#1e293b);
color:#f8fafc;
overflow-x:hidden;
}
  .cursor-glow{
position:fixed;
width:300px;
height:300px;
background:radial-gradient(circle,#38bdf8 0%,transparent 70%);
pointer-events:none;
filter:blur(80px);
opacity:0.6;
transform:translate(-50%,-50%);
z-index:0;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 60px;
background:rgba(2,6,23,0.7);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
font-size:24px;
font-weight:bold;
color:#38bdf8;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
text-shadow:0 0 10px #38bdf8;
}
to{
text-shadow:0 0 30px #38bdf8,0 0 50px #38bdf8;
}
}

.menu a{
margin-left:25px;
text-decoration:none;
color:white;
font-weight:bold;
}

/* PAGE */

.container{
padding-top:120px;
max-width:700px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:40px;
}

/* FORM */

form{
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:15px;
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(270deg,#38bdf8,#6366f1,#38bdf8);
background-size:400% 400%;
animation:gradientMove 6s infinite;
color:white;
font-weight:bold;
cursor:pointer;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

footer{
text-align:center;
padding:30px;
margin-top:60px;
background:rgba(255,255,255,0.05);
}

</style>
</head>

<body>
  <div class="cursor-glow"></div>

<nav>

<div class="logo">NextByte Studio</div>

<div class="menu">
<a href="index.html">Home</a>
<a href="request.html">Request Project</a>
<a href="privacy-policy.html">Privacy Policy</a>
</div>

</nav>

<div class="container">

<h1>Start Your Project</h1>

<form>

<label>Name</label>
<input type="text" placeholder="Your Name">

<label>Email</label>
<input type="email" placeholder="Your Email">

<label>Project Type</label>
<select>
<option>Mobile App</option>
<option>Website</option>
<option>Custom Software</option>
</select>

<label>Project Description</label>
<textarea rows="5"></textarea>

<button type="submit">Submit Request</button>

</form>

</div>

<footer>

<p>© 2026 NextByte Studio</p>

</footer>

</body>
  <script>

const glow = document.querySelector(".cursor-glow");

document.addEventListener("mousemove", e=>{
glow.style.left = e.clientX + "px";
glow.style.top = e.clientY + "px";
});

</script>
</html>
